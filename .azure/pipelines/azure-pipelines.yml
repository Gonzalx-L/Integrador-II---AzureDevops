trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: ubuntu-latest

variables:
  FUNCTION_APP_NAME: "func-docucolab-dev"
  WEB_APP_NAME: "app-docucolab-dev"
  NODE_VERSION: "18.x"

stages:

# ─── STAGE 1: BUILD ───────────────────────────────────────────────────────────
- stage: Build
  displayName: "Build — Backend y Frontend"
  jobs:

  - job: BuildBackend
    displayName: "Build Backend (TypeScript → JS)"
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(NODE_VERSION)
      displayName: "Instalar Node.js $(NODE_VERSION)"

    - script: |
        cd backend
        npm ci
        npm run build
      displayName: "npm ci + tsc"

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: "backend"
        includeRootFolder: false
        archiveType: zip
        archiveFile: "$(Build.ArtifactStagingDirectory)/backend.zip"
      displayName: "Empaquetar backend"

    - publish: "$(Build.ArtifactStagingDirectory)/backend.zip"
      artifact: backend
      displayName: "Publicar artefacto backend"

  - job: BuildFrontend
    displayName: "Build Frontend (HTML/JS)"
    steps:
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: "frontend"
        includeRootFolder: false
        archiveType: zip
        archiveFile: "$(Build.ArtifactStagingDirectory)/frontend.zip"
      displayName: "Empaquetar frontend"

    - publish: "$(Build.ArtifactStagingDirectory)/frontend.zip"
      artifact: frontend
      displayName: "Publicar artefacto frontend"

# ─── STAGE 2: DEPLOY ──────────────────────────────────────────────────────────
- stage: Deploy
  displayName: "Deploy a Azure"
  dependsOn: Build
  condition: succeeded()
  jobs:

  - deployment: DeployBackend
    displayName: "Deploy Backend → Azure Functions"
    environment: "dev"
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: backend

          - task: AzureFunctionApp@2
            inputs:
              connectedServiceNameARM: "AzureServiceConnection"
              appType: functionAppLinux
              appName: $(FUNCTION_APP_NAME)
              package: "$(Pipeline.Workspace)/backend/backend.zip"
              runtimeStack: "NODE|18"
            displayName: "Deploy Function App"

  - deployment: DeployFrontend
    displayName: "Deploy Frontend → Azure App Service"
    environment: "dev"
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: frontend

          - task: AzureWebApp@1
            inputs:
              azureSubscription: "AzureServiceConnection"
              appType: webAppLinux
              appName: $(WEB_APP_NAME)
              package: "$(Pipeline.Workspace)/frontend/frontend.zip"
              runtimeStack: "NODE|18-lts"
            displayName: "Deploy Web App"
