name: Deploy DocuColab

on:
  push:
    branches: [ main ]

jobs:
  # ── FRONTEND → Azure Static Web Apps ─────────────────────
  deploy_frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias frontend
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Login a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend via SWA CLI
        run: |
          TOKEN=$(az staticwebapp secrets list \
            --name swa-docucolab-dev \
            --resource-group rg-bluetab-docucolab-dev \
            --query "properties.apiKey" -o tsv)
          npm install -g @azure/static-web-apps-cli
          swa deploy ./frontend/dist \
            --deployment-token "$TOKEN" \
            --env production

  # ── BACKEND → Azure Functions ─────────────────────────────
  deploy_backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      - name: Build TypeScript
        run: npm run build
        working-directory: backend

      - name: Login a Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy a Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-docucolab-dev
          package: backend
          respect-funcignore: true
