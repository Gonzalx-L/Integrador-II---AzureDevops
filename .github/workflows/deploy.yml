name: Deploy DocuColab

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── BUILD Y DEPLOY DEL FRONTEND ──────────────────────────
  deploy_frontend:
    name: Build y Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: frontend

      - name: Build Vite
        run: npm run build
        working-directory: frontend

      - name: Deploy a Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          output_location: "dist"
          skip_app_build: true   # ya lo hicimos arriba

  # ── BUILD Y DEPLOY DEL BACKEND ───────────────────────────
  deploy_backend:
    name: Build y Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        run: npm ci
        working-directory: backend

      - name: Build TypeScript
        run: npm run build
        working-directory: backend

      - name: Deploy a Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-docucolab-dev
          package: backend
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}
          respect-funcignore: true
